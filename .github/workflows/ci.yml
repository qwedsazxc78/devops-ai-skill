name: CI — Structure Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  structure-tests:
    name: Structure & Cross-Platform Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run structure tests
        run: bash tests/test-structure.sh

  version-consistency:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check version consistency
        run: bash scripts/version-consistency.sh

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for hardcoded secrets
        run: |
          PATTERNS=(
            'password\s*=\s*['"'"'"]'
            'api_key\s*=\s*['"'"'"]'
            'AKIA[0-9A-Z]{16}'
          )
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            if grep -rn "$pattern" . \
              --include="*.md" --include="*.json" --include="*.yaml" --include="*.sh" \
              --exclude-dir=tests --exclude-dir=.git --exclude="CHANGELOG.md" \
              2>/dev/null | grep -v "example\|template\|placeholder\|<\|command\|install\|brew\|apt\|snap\|uv\|pip"; then
              FOUND=1
            fi
          done
          [ $FOUND -eq 0 ] && echo "No secrets found" || { echo "Potential secrets detected!"; exit 1; }
