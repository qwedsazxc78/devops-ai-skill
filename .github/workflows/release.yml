name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create GitHub Release & Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag matches VERSION
        env:
          TAG_REF: ${{ github.ref_name }}
        run: bash scripts/version-consistency.sh --tag "$TAG_REF"

      - name: Run structure tests
        run: bash tests/test-structure.sh

      - name: Extract changelog for this version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          awk "/## \[$VERSION\]/{found=1; next} /## \[/{found=0} found" CHANGELOG.md > /tmp/release-notes.md
          echo "Release notes:"
          cat /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- npm publish via pnpm ---
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync version from tag to package.json
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_REF#v}"
          pnpm version "$TAG_VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
